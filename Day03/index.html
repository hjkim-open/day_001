<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="모닝브루 온라인 예약 — 이름·연락처·픽업 시간을 입력해 간편하게 예약하세요." />
    <title>모닝브루 · 예약하기</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <script defer src="https://cloud.umami.is/script.js" data-website-id="2a93d7d2-f64f-45aa-9e00-6da5cae3c24a"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
      :root {
        --bg: #fbf7f1;
        --surface: #ffffff;
        --ink: #1f1a16;
        --ink-soft: #5b524b;
        --line: #ece4d8;
        --accent: #2f7a4f;
        --accent-strong: #226039;
        --brand: #6b4a2b;
        --danger: #c14a3a;
        --danger-soft: #fbe9e6;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0; padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Pretendard Variable", "Pretendard", -apple-system,
          BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
        font-size: 16px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
      }

      .container {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* ── 헤더 ─────────────────────────────────────── */
      header {
        padding: 20px 0 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(251,247,241,.92);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        position: sticky; top: 0; z-index: 10;
      }
      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--brand);
        font-size: 17px;
      }
      .brand::before { content: "☕ "; }
      .back-home {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        font-weight: 600;
        color: var(--accent);
        padding: 5px 12px;
        border: 1.5px solid var(--accent);
        border-radius: 999px;
        text-decoration: none;
        transition: background .15s, color .15s;
      }
      .back-home:hover { background: var(--accent); color: #fff; }

      /* ── 본문 ─────────────────────────────────────── */
      main {
        padding: 32px 0 60px;
      }

      .page-title {
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -0.03em;
        margin-bottom: 4px;
      }
      .page-sub {
        font-size: 14px;
        color: var(--ink-soft);
        margin-bottom: 28px;
      }

      /* ── 폼 카드 ──────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 24px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }
      label {
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      label .req { color: var(--danger); margin-left: 2px; }
      label .opt { color: var(--ink-soft); font-weight: 500; font-size: 12px; margin-left: 4px; }

      input, textarea {
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        font-size: 15px;
        font-family: inherit;
        color: var(--ink);
        transition: border-color .15s, box-shadow .15s;
      }
      input { height: 46px; }
      textarea {
        height: 80px;
        padding: 12px 14px;
        resize: none;
        line-height: 1.5;
      }
      input:focus, textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px #ecf5ef;
      }
      input::placeholder, textarea::placeholder { color: #b3a99c; }

      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .error {
        margin: 6px 0 0;
        padding: 10px 12px;
        background: var(--danger-soft);
        color: var(--danger);
        border-radius: 10px;
        font-size: 13px;
        display: none;
      }
      .error.show { display: block; }

      .success {
        margin: 12px 0 0;
        padding: 14px 16px;
        background: #ecf5ef;
        color: var(--accent-strong);
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        display: none;
        text-align: center;
      }
      .success.show { display: block; }

      .btn-submit {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        height: 52px;
        margin-top: 4px;
        border-radius: 14px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        font-family: inherit;
        letter-spacing: -0.01em;
        cursor: pointer;
        transition: background .15s, transform .06s;
      }
      .btn-submit:hover { background: var(--accent-strong); }
      .btn-submit:active { transform: translateY(1px); }
      .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

      /* ── 배지 ─────────────────────────────────────── */
      .db-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 999px;
        background: #ecf5ef;
        color: var(--accent-strong);
      }
      .db-badge.error { background: var(--danger-soft); color: var(--danger); }
      .db-badge::before { content: "●"; font-size: 7px; }
    </style>
  </head>
  <body>
    <header>
      <div class="container header-inner">
        <span class="brand">모닝브루</span>
        <span class="db-badge" id="db-badge">연결 중…</span>
        <a href="/" class="back-home">← 홈으로</a>
      </div>
    </header>

    <div class="container">
      <main>
        <div class="page-title">예약하기</div>
        <p class="page-sub">픽업 시간과 인원을 알려주시면 준비해 드릴게요 ☕</p>

        <div class="card">
          <form id="form" novalidate>
            <div class="field">
              <label for="name">이름<span class="req">*</span></label>
              <input type="text" id="name" placeholder="예: 김민지" maxlength="20" required />
            </div>

            <div class="field">
              <label for="phone">연락처<span class="req">*</span></label>
              <input type="tel" id="phone" placeholder="예: 010-1234-5678"
                inputmode="tel" pattern="[0-9\-\s]{7,}" maxlength="20" required />
            </div>

            <div class="row-2">
              <div class="field">
                <label for="pickup">픽업 시간<span class="req">*</span></label>
                <input type="time" id="pickup" required />
              </div>
              <div class="field">
                <label for="people">인원수<span class="req">*</span></label>
                <input type="number" id="people" min="1" max="20" value="1" required />
              </div>
            </div>

            <div class="field">
              <label for="note">메모<span class="opt">(선택)</span></label>
              <textarea id="note" placeholder="알레르기, 특별 요청 사항 등을 적어주세요"></textarea>
            </div>

            <p class="error" id="error" role="alert"></p>
            <p class="success" id="success" role="status"></p>

            <button type="submit" class="btn-submit" id="submit-btn">예약 확정하기</button>
          </form>
        </div>
      </main>
    </div>

    <script>
      // ── 환경변수 로드 → Supabase 초기화 ─────────────
      let sb = null;
      const dbBadge = document.getElementById("db-badge");

      function setBadge(ok, label) {
        dbBadge.textContent = label;
        dbBadge.className = "db-badge" + (ok ? "" : " error");
      }

      async function initSupabase() {
        try {
          const res = await fetch("/api/env");
          if (!res.ok) throw new Error("env API " + res.status);
          const { supabaseUrl, supabaseAnonKey } = await res.json();
          if (!supabaseUrl || !supabaseAnonKey) throw new Error("env 값 없음");
          const { createClient } = window.supabase;
          sb = createClient(supabaseUrl, supabaseAnonKey);
          setBadge(true, "예약 가능");
        } catch (e) {
          console.warn("Supabase 연결 실패 (로컬 모드):", e.message);
          setBadge(false, "오프라인 모드");
        }
      }

      // ── localStorage 백업 ────────────────────────────
      const STORAGE_KEY = "morningbrew.reservations.day03.v1";

      function loadLocal() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
        catch { return []; }
      }
      function saveLocal(list) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
        catch (e) { console.warn("로컬 저장 실패:", e); }
      }

      async function backupToSupabase(record) {
        if (!sb) return;
        try {
          const { data, error } = await sb.from("reservations").insert({
            name: record.name,
            phone: record.phone,
            time: record.pickup,
            count: record.people,
            note: record.note || null,
            status: "pending",
          }).select("id").single();

          if (error) { console.warn("Supabase 백업 실패:", error.message); return; }

          const list = loadLocal();
          const idx = list.findIndex(r => r.id === record.id);
          if (idx !== -1) { list[idx].supabaseId = data.id; saveLocal(list); }
          console.log("✅ Supabase 백업:", data.id);
        } catch (e) { console.warn("백업 오류:", e); }
      }

      // ── DOM 요소 ─────────────────────────────────────
      const form      = document.getElementById("form");
      const errorEl   = document.getElementById("error");
      const successEl = document.getElementById("success");
      const submitBtn = document.getElementById("submit-btn");
      const pickupEl  = document.getElementById("pickup");

      // 픽업 시간 기본값: 현재 + 30분
      const def = new Date(Date.now() + 30 * 60 * 1000);
      pickupEl.value =
        `${String(def.getHours()).padStart(2,"0")}:${String(def.getMinutes()).padStart(2,"0")}`;

      // ── 폼 제출 ──────────────────────────────────────
      let nextId = loadLocal().reduce((m, r) => Math.max(m, r.id || 0), 0) + 1;

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        errorEl.classList.remove("show");
        successEl.classList.remove("show");

        const name   = document.getElementById("name").value.trim();
        const phone  = document.getElementById("phone").value.trim();
        const pickup = pickupEl.value;
        const people = parseInt(document.getElementById("people").value, 10);
        const note   = document.getElementById("note").value.trim();

        if (!name) return showError("이름을 입력해 주세요.");
        if (!phone || !/^[0-9\-\s]{7,}$/.test(phone))
          return showError("연락처를 정확히 입력해 주세요.");
        if (!pickup) return showError("픽업 시간을 선택해 주세요.");
        if (!people || people < 1 || people > 20)
          return showError("인원수는 1~20명 사이로 입력해 주세요.");

        submitBtn.disabled = true;
        submitBtn.textContent = "저장 중…";

        const record = { id: nextId++, name, phone, pickup, people, note, createdAt: Date.now() };
        const list = loadLocal();
        list.push(record);
        saveLocal(list);

        backupToSupabase(record);

        submitBtn.disabled = false;
        submitBtn.textContent = "예약 확정하기";

        form.reset();
        document.getElementById("people").value = 1;
        const t = new Date(Date.now() + 30 * 60 * 1000);
        pickupEl.value = `${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`;

        successEl.textContent = `${name}님, 예약이 접수되었습니다! 오전 ${formatTime(pickup)}에 준비해 드릴게요 ☕`;
        successEl.classList.add("show");
        document.getElementById("name").focus();
      });

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add("show");
      }

      function formatTime(hhmm) {
        if (!hhmm) return "";
        const [h, m] = hhmm.split(":").map(Number);
        const p = h < 12 ? "오전" : "오후";
        const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
        return `${p} ${h12}:${String(m).padStart(2,"0")}`;
      }

      // 앱 시작
      initSupabase();
    </script>
  </body>
</html>

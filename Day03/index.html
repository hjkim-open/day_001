<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="모닝브루 예약 관리 — 카페 사장님을 위한 간단한 예약 입력·관리 도구." />
    <title>모닝브루 · 예약 관리</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
      :root {
        --bg: #fbf7f1;
        --surface: #ffffff;
        --ink: #1f1a16;
        --ink-soft: #5b524b;
        --line: #ece4d8;
        --accent: #2f7a4f;
        --accent-strong: #226039;
        --brand: #6b4a2b;
        --brand-soft: #b58a5a;
        --danger: #c14a3a;
        --danger-soft: #fbe9e6;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Pretendard Variable", "Pretendard", -apple-system,
          BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
        font-size: 16px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        width: 100%;
        max-width: 1080px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* ── Header ─────────────────────────────────────── */
      header {
        padding: 28px 0 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(251, 247, 241, 0.92);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--brand);
        font-size: 18px;
      }
      .brand::before { content: "☕"; margin-right: 6px; }
      .title {
        font-size: 14px;
        color: var(--ink-soft);
        font-weight: 600;
      }
      .today {
        font-size: 12px;
        color: var(--ink-soft);
      }
      .db-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 999px;
        background: #ecf5ef;
        color: var(--accent-strong);
        letter-spacing: 0.02em;
      }
      .db-badge.error { background: var(--danger-soft); color: var(--danger); }
      .db-badge::before { content: "●"; font-size: 8px; }
      .back-home {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        font-weight: 600;
        color: var(--accent);
        padding: 5px 12px;
        border: 1.5px solid var(--accent);
        border-radius: 999px;
        transition: background 0.15s, color 0.15s;
      }
      .back-home:hover {
        background: var(--accent);
        color: #fff;
      }

      /* ── Layout ─────────────────────────────────────── */
      main {
        padding: 28px 0 80px;
        display: grid;
        gap: 20px;
        grid-template-columns: 1fr;
      }
      @media (min-width: 880px) {
        main {
          grid-template-columns: 360px 1fr;
          align-items: start;
        }
        .form-card {
          position: sticky;
          top: 88px;
        }
      }

      /* ── Card ───────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 22px;
      }
      .card-title {
        margin: 0 0 4px;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .card-sub {
        margin: 0 0 18px;
        font-size: 13px;
        color: var(--ink-soft);
      }

      /* ── Form ───────────────────────────────────────── */
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 14px;
      }
      label {
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      label .req {
        color: var(--danger);
        margin-left: 2px;
      }
      input {
        height: 46px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        font-size: 15px;
        font-family: inherit;
        color: var(--ink);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px #ecf5ef;
      }
      input::placeholder {
        color: #b3a99c;
      }
      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .error {
        margin: 6px 0 0;
        padding: 10px 12px;
        background: var(--danger-soft);
        color: var(--danger);
        border-radius: 10px;
        font-size: 13px;
        display: none;
      }
      .error.show { display: block; }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 50px;
        padding: 0 20px;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.01em;
        border: 1px solid transparent;
        cursor: pointer;
        font-family: inherit;
        transition: transform 0.06s ease, background 0.15s ease,
          border-color 0.15s ease;
      }
      .btn:active { transform: translateY(1px); }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        width: 100%;
      }
      .btn-primary:hover { background: var(--accent-strong); }

      .btn-ghost {
        background: transparent;
        color: var(--danger);
        border-color: transparent;
        height: 36px;
        padding: 0 12px;
        font-size: 13px;
      }
      .btn-ghost:hover {
        background: var(--danger-soft);
      }

      /* ── List ───────────────────────────────────────── */
      .list-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 14px;
      }
      .count-pill {
        padding: 4px 10px;
        border-radius: 999px;
        background: #ecf5ef;
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 700;
      }
      ul.reservations {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 14px;
        background: #fdfaf4;
        border: 1px solid var(--line);
        border-radius: 14px;
      }
      .time-chip {
        flex: 0 0 auto;
        min-width: 64px;
        padding: 10px 8px;
        border-radius: 12px;
        background: var(--surface);
        border: 1px solid var(--line);
        text-align: center;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--brand);
      }
      .time-chip small {
        display: block;
        font-size: 10px;
        font-weight: 700;
        color: var(--ink-soft);
        margin-bottom: 2px;
        letter-spacing: 0.02em;
      }
      .meta {
        flex: 1;
        min-width: 0;
      }
      .meta-line1 {
        display: flex;
        align-items: baseline;
        gap: 8px;
        flex-wrap: wrap;
      }
      .name {
        font-weight: 700;
        font-size: 15px;
        letter-spacing: -0.01em;
      }
      .people {
        font-size: 12px;
        color: var(--ink-soft);
        font-weight: 600;
      }
      .phone {
        margin-top: 2px;
        font-size: 13px;
        color: var(--ink-soft);
      }

      /* ── Empty state ────────────────────────────────── */
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--ink-soft);
      }
      .empty-emoji {
        font-size: 36px;
        margin-bottom: 8px;
      }
      .empty-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 4px;
      }
      .empty-sub {
        font-size: 13px;
      }

      /* ── A11y ───────────────────────────────────────── */
      .sr-only {
        position: absolute;
        width: 1px; height: 1px;
        padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0);
        white-space: nowrap; border: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container header-inner">
        <span class="brand">모닝브루</span>
        <span class="title">예약 관리</span>
        <span class="today" id="today" aria-live="polite"></span>
        <span class="db-badge" id="db-badge">DB 연결 중…</span>
        <a href="/" class="back-home">← 홈으로</a>
      </div>
    </header>

    <div class="container">
      <main>
        <!-- 폼 -->
        <section class="card form-card" aria-labelledby="form-title">
          <h2 class="card-title" id="form-title">새 예약 추가</h2>
          <p class="card-sub">손님의 이름과 연락처, 픽업 시간, 인원을 입력하세요.</p>

          <form id="form" novalidate>
            <div class="field">
              <label for="name">이름<span class="req">*</span></label>
              <input type="text" id="name" name="name" placeholder="예: 김민지" maxlength="20" required />
            </div>

            <div class="field">
              <label for="phone">연락처<span class="req">*</span></label>
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="예: 010-1234-5678"
                inputmode="tel"
                pattern="[0-9\-\s]{7,}"
                maxlength="20"
                required
              />
            </div>

            <div class="row-2">
              <div class="field">
                <label for="pickup">픽업 시간<span class="req">*</span></label>
                <input type="time" id="pickup" name="pickup" required />
              </div>
              <div class="field">
                <label for="people">인원수<span class="req">*</span></label>
                <input
                  type="number"
                  id="people"
                  name="people"
                  min="1"
                  max="20"
                  value="1"
                  required
                />
              </div>
            </div>

            <p class="error" id="error" role="alert"></p>

            <button type="submit" class="btn btn-primary">+ 예약 추가</button>
          </form>
        </section>

        <!-- 목록 -->
        <section class="card" aria-labelledby="list-title">
          <div class="list-head">
            <h2 class="card-title" id="list-title">오늘의 예약</h2>
            <span class="count-pill" id="count">0건</span>
          </div>

          <div id="empty" class="empty">
            <div class="empty-emoji">☕</div>
            <div class="empty-title">아직 예약이 없습니다.</div>
            <div class="empty-sub">첫 예약을 추가해 보세요!</div>
          </div>

          <ul class="reservations" id="list" aria-live="polite"></ul>
        </section>
      </main>
    </div>

    <script>
      // ─────────────────────────────────────────────────
      // Supabase 클라이언트 (백업용)
      // ─────────────────────────────────────────────────
      let sb = null;
      try {
        const { createClient } = window.supabase;
        sb = createClient(
          "https://uzrnemzcmfysdmvzxycb.supabase.co",
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6cm5lbXpjbWZ5c2Rtdnp4eWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODQ1MjksImV4cCI6MjA5NzU2MDUyOX0.1l_-u5_4JOWKUczEC9NGp7GzFEyQ4wCOCo_Zp26S-b4"
        );
      } catch (err) {
        console.error("Supabase 초기화 실패:", err);
      }

      // ─────────────────────────────────────────────────
      // 로컬스토리지 (주 저장소)
      // ─────────────────────────────────────────────────
      const STORAGE_KEY = "morningbrew.reservations.day03.v1";

      function loadLocal() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch { return []; }
      }

      function saveLocal() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(reservations));
        } catch (e) {
          console.warn("로컬 저장 실패:", e);
        }
      }

      let reservations = loadLocal();
      let nextId = reservations.reduce((m, r) => Math.max(m, r.id || 0), 0) + 1;

      const $ = (id) => document.getElementById(id);
      const form      = $("form");
      const listEl    = $("list");
      const emptyEl   = $("empty");
      const countEl   = $("count");
      const errorEl   = $("error");
      const submitBtn = form.querySelector('button[type="submit"]');

      // ── 오늘 날짜 표시 ──────────────────────────────
      const now = new Date();
      const weekday = ["일", "월", "화", "수", "목", "금", "토"][now.getDay()];
      $("today").textContent =
        `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")} (${weekday})`;

      // 픽업 시간 기본값: 현재 시각 + 30분
      const defaultTime = new Date(now.getTime() + 30 * 60 * 1000);
      $("pickup").value =
        `${String(defaultTime.getHours()).padStart(2,"0")}:${String(defaultTime.getMinutes()).padStart(2,"0")}`;

      // ── DB 배지 ─────────────────────────────────────
      const dbBadge = $("db-badge");
      function setDbBadge(ok, label) {
        dbBadge.textContent = label;
        dbBadge.className = "db-badge" + (ok ? "" : " error");
      }
      setDbBadge(!!sb, sb ? "Supabase 연결됨" : "Supabase 오프라인");

      // ── Supabase 비동기 백업 ─────────────────────────
      async function backupToSupabase(record) {
        if (!sb) return;
        setDbBadge(true, "백업 중…");
        try {
          const { data, error } = await sb
            .from("reservations")
            .insert({ name: record.name, phone: record.phone, time: record.pickup, count: record.people })
            .select("id")
            .single();

          if (error) {
            console.warn("Supabase 백업 실패:", error.message);
            setDbBadge(false, "백업 실패");
          } else {
            const idx = reservations.findIndex((r) => r.id === record.id);
            if (idx !== -1) {
              reservations[idx].supabaseId = data.id;
              saveLocal();
            }
            setDbBadge(true, "백업 완료 ✓");
          }
        } catch (err) {
          console.error("Supabase 백업 오류:", err);
          setDbBadge(false, "백업 실패");
        }
      }

      async function deleteFromSupabase(supabaseId) {
        if (!sb || !supabaseId) return;
        try {
          await sb.from("reservations").delete().eq("id", supabaseId);
        } catch (err) {
          console.warn("Supabase 삭제 오류:", err);
        }
      }

      // ── 폼 제출 → 로컬 저장 후 Supabase 백업 ────────
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        errorEl.classList.remove("show");

        const name   = $("name").value.trim();
        const phone  = $("phone").value.trim();
        const pickup = $("pickup").value;
        const people = parseInt($("people").value, 10);

        if (!name) return showError("이름을 입력해 주세요.");
        if (!phone || !/^[0-9\-\s]{7,}$/.test(phone))
          return showError("연락처를 정확히 입력해 주세요.");
        if (!pickup) return showError("픽업 시간을 선택해 주세요.");
        if (!people || people < 1 || people > 20)
          return showError("인원수는 1~20명 사이로 입력해 주세요.");

        // 1. 로컬에 즉시 저장
        const newRecord = { id: nextId++, name, phone, pickup, people, createdAt: Date.now() };
        reservations.push(newRecord);
        reservations.sort((a, b) => a.pickup.localeCompare(b.pickup));
        saveLocal();
        render();

        // 2. Supabase 백업 (비동기 — 실패해도 로컬은 유지)
        backupToSupabase(newRecord);

        form.reset();
        $("people").value = 1;
        const t = new Date(Date.now() + 30 * 60 * 1000);
        $("pickup").value =
          `${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`;
        $("name").focus();
      });

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add("show");
      }

      // ── 삭제 → 로컬 삭제 후 Supabase 삭제 ──────────
      listEl.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-action='delete']");
        if (!btn) return;
        const id = Number(btn.dataset.id);
        const idx = reservations.findIndex((r) => r.id === id);
        if (idx === -1) return;

        const target = reservations[idx];
        if (!confirm(`${target.name}님(${formatTime(target.pickup)})의 예약을 삭제할까요?`)) return;

        const supabaseId = target.supabaseId;
        reservations.splice(idx, 1);
        saveLocal();
        render();

        deleteFromSupabase(supabaseId);
      });

      // 다른 탭에서 변경 시 자동 반영
      window.addEventListener("storage", (e) => {
        if (e.key === STORAGE_KEY) {
          reservations = loadLocal();
          nextId = reservations.reduce((m, r) => Math.max(m, r.id || 0), 0) + 1;
          render();
        }
      });

      // ── 렌더링 ──────────────────────────────────────
      function render() {
        countEl.textContent = `${reservations.length}건`;

        if (reservations.length === 0) {
          emptyEl.style.display = "block";
          listEl.innerHTML = "";
          return;
        }
        emptyEl.style.display = "none";

        listEl.innerHTML = reservations
          .map((r) => `
            <li class="item">
              <div class="time-chip" aria-label="픽업 시간 ${escapeHtml(r.pickup)}">
                <small>PICKUP</small>${escapeHtml(formatTime(r.pickup))}
              </div>
              <div class="meta">
                <div class="meta-line1">
                  <span class="name">${escapeHtml(r.name)}</span>
                  <span class="people">${r.people}명</span>
                </div>
                <div class="phone">${escapeHtml(r.phone)}</div>
              </div>
              <button
                type="button"
                class="btn btn-ghost"
                data-action="delete"
                data-id="${r.id}"
                aria-label="${escapeHtml(r.name)}님 예약 삭제"
              >삭제</button>
            </li>`)
          .join("");
      }

      function formatTime(hhmm) {
        if (!hhmm) return "";
        const [hStr, mStr] = hhmm.split(":");
        const h = Number(hStr);
        const m = Number(mStr);
        const period = h < 12 ? "오전" : "오후";
        const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
        return `${period} ${h12}:${String(m).padStart(2, "0")}`;
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      // 초기 렌더 (로컬 데이터로 즉시 표시)
      render();
    </script>
  </body>
</html>
